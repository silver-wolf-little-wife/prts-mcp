services:
  prts-mcp-ts:
    image: crpi-1txugqp0dkatkk3t.cn-shanghai.personal.cr.aliyuncs.com/chengxiyue/prts-mcp-ts:latest
    # 备用: ghcr.io/silver-wolf-little-wife/prts-mcp-ts:latest
    # 如需本地构建，注释掉上面那行，取消注释下面：
    # build:
    #   context: .
    #   dockerfile: ts/Dockerfile
    container_name: prts-mcp-ts
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - prts-mcp-data:/data/gamedata
      - prts-mcp-levels:/data/gamedata-levels
      - prts-mcp-storyjson:/data/storyjson
    environment:
      - PORT=3000
      # 国内服务器建议启用 GitHub 镜像加速（逗号分隔，逐个尝试）
      - GITHUB_MIRRORS=https://edgeone.gh-proxy.com,https://hk.gh-proxy.com,https://gh-proxy.com,https://gh.llkk.cc
      # 可选：GitHub Token 提升 API 限额
      # - GITHUB_TOKEN=ghp_xxx
      # 可选：下载超时秒数（默认 300，镜像慢时可调大）
      # - SYNC_TIMEOUT_SECONDS=600
      # 可选：自定义数据路径（设置后禁用自动同步）
      # - GAMEDATA_PATH=/custom/path
      # - STORYJSON_PATH=/custom/story.zip

volumes:
  prts-mcp-data:
  prts-mcp-levels:
  prts-mcp-storyjson:
