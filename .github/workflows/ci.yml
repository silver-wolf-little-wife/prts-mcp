name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/**
      - refactor/**
    paths:
      - 'python/**'
      - 'ts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'ts/**'
      - '.github/workflows/ci.yml'

jobs:
  # ---------------------------------------------------------------------------
  # Python implementation
  # ---------------------------------------------------------------------------
  verify-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e python/ pytest

      - name: Compile source files
        run: python -m compileall python/src python/scripts

      - name: Download storyjson zip for integration tests
        run: |
          mkdir -p .ci-data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir .ci-data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: python -m pytest python/tests
        env:
          STORYJSON_ZIP: ${{ github.workspace }}/.ci-data/storyjson/zh_CN.zip

      - name: Verify import and config fallback
        run: |
          mkdir -p .ci-empty/gamedata
          export GAMEDATA_PATH="$PWD/.ci-empty/gamedata"
          python - <<'PY'
          from pathlib import Path
          from prts_mcp.config import Config
          from prts_mcp.data.operator import get_operator_archives

          cfg = Config.load()
          assert cfg.gamedata_path is not None
          assert cfg.gamedata_path.resolve() == Path(".ci-empty/gamedata").resolve()
          assert cfg.has_operator_data is False
          assert cfg.has_story_data is False
          message = get_operator_archives("阿米娅")
          assert "干员数据暂不可用" in message
          print("Import/config verification passed.")
          PY

  build-image-python:
    runs-on: ubuntu-latest
    needs: verify-python
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e python/

      - name: Restore cached gamedata
        uses: actions/cache/restore@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}
          restore-keys: gamedata-

      - name: Fetch latest gamedata from GitHub
        run: python python/scripts/fetch_gamedata.py
        # Exits 0 on success or when cached data covers a network failure.
        # Exits 1 (fails the build) only when no data is available at all.

      - name: Download bundled storyjson zip
        run: |
          mkdir -p data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save gamedata cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}

      - name: Build Docker image
        run: docker build -f python/Dockerfile -t prts-mcp-python:latest .

      - name: Smoke test Docker image
        run: |
          python - <<'PY'
          import subprocess, json, sys

          proc = subprocess.Popen(
              ["docker","run","-i","--rm","prts-mcp-python:latest"],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
          )

          def send(msg):
              proc.stdin.write((json.dumps(msg) + "\n").encode())
              proc.stdin.flush()

          def recv():
              line = proc.stdout.readline()
              if not line:
                  raise RuntimeError("stdout closed unexpectedly")
              return json.loads(line)

          send({"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}})
          r = recv()
          assert r.get("id") == 1, f"Expected initialize response, got: {r}"

          send({"jsonrpc":"2.0","method":"notifications/initialized","params":{}})
          send({"jsonrpc":"2.0","method":"tools/list","id":2,"params":{}})
          r = recv()
          assert r.get("id") == 2, f"Expected tools/list response, got: {r}"

          names = {t["name"] for t in r["result"]["tools"]}
          expected = {"get_operator_archives", "search_prts", "list_story_events", "list_stories", "read_story", "read_activity"}
          for tool in expected:
              assert tool in names, f"Missing tool: {tool}. Got: {names}"
          print("Smoke test passed:", sorted(names))

          proc.stdin.close()
          proc.wait(timeout=10)
          PY

  # ---------------------------------------------------------------------------
  # TypeScript implementation
  # ---------------------------------------------------------------------------
  verify-ts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'ts/package.json'
          cache: 'npm'
          cache-dependency-path: 'ts/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ts

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: ts

      - name: Run tests
        run: npm test
        working-directory: ts

      - name: Build
        run: npx tsc
        working-directory: ts

  build-image-ts:
    runs-on: ubuntu-latest
    needs: verify-ts
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package (for fetch_gamedata script)
        run: python -m pip install -e python/

      - name: Restore cached gamedata
        uses: actions/cache/restore@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}
          restore-keys: gamedata-

      - name: Fetch latest gamedata from GitHub
        run: python python/scripts/fetch_gamedata.py

      - name: Download bundled storyjson zip
        run: |
          mkdir -p data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save gamedata cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}

      - name: Build Docker image
        run: docker build -f ts/Dockerfile -t prts-mcp-ts:latest .

      - name: Smoke test Docker image (HTTP health check)
        run: |
          docker run -d --name prts-mcp-ts-ci -p 3000:3000 prts-mcp-ts:latest
          # Wait for server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:3000/health | grep '"status":"ok"'
          echo "Health check passed."
          docker rm -f prts-mcp-ts-ci
