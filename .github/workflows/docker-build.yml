name: 构建并推送 Docker 镜像 (TS)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: prts-mcp-ts
  ACR_REGISTRY: crpi-1txugqp0dkatkk3t.cn-shanghai.personal.cr.aliyuncs.com
  ACR_NAMESPACE: chengxiyue

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 包（fetch_gamedata 脚本需要）
        run: python -m pip install -e python/

      - name: 恢复 gamedata 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}
          restore-keys: gamedata-

      - name: 拉取最新 gamedata
        run: python python/scripts/fetch_gamedata.py

      - name: 下载 storyjson
        run: |
          mkdir -p data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 保存 gamedata 缓存
        uses: actions/cache/save@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 提取元数据（标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ts/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
