name: CD

on:
  push:
    tags:
      - "python/v[0-9]*.[0-9]*.[0-9]*"
      - "python/v[0-9]*.[0-9]*.[0-9]*-*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e python/ pytest

      - name: Compile source files
        run: python -m compileall python/src python/scripts

      - name: Download storyjson zip for integration tests
        run: |
          mkdir -p .ci-data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir .ci-data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: python -m pytest python/tests
        env:
          STORYJSON_ZIP: ${{ github.workspace }}/.ci-data/storyjson/zh_CN.zip

      - name: Check tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#python/v}"
          python -c "import importlib.metadata, re, sys; normalize=lambda v: re.sub(r'-(alpha|beta|rc|a|b)\.?', lambda m: {'alpha': 'a', 'beta': 'b'}.get(m.group(1), m.group(1)), v); tag=normalize(sys.argv[1]); pkg=normalize(importlib.metadata.version('prts-mcp')); print(f'Version check passed: {tag}') if tag == pkg else (print(f'::error::Tag version ({tag}) does not match package version ({pkg}) in pyproject.toml'), sys.exit(1))" "$TAG_VERSION"

      - name: Verify import and config fallback
        run: |
          mkdir -p .ci-empty/gamedata .ci-empty/storyjson
          export GAMEDATA_PATH="$PWD/.ci-empty/gamedata"
          export STORYJSON_PATH="$PWD/.ci-empty/storyjson"
          python - <<'PY'
          from pathlib import Path
          from prts_mcp.config import Config
          from prts_mcp.data.operator import get_operator_archives

          cfg = Config.load()
          assert cfg.gamedata_path is not None
          assert cfg.gamedata_path.resolve() == Path(".ci-empty/gamedata").resolve()
          assert cfg.has_operator_data is False
          message = get_operator_archives("阿米娅")
          assert "干员数据暂不可用" in message
          print("Import/config verification passed.")
          PY

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      version: ${{ steps.version.outputs.value }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e python/

      - name: Restore cached gamedata
        uses: actions/cache/restore@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}
          restore-keys: gamedata-

      - name: Fetch latest gamedata from GitHub
        run: python python/scripts/fetch_gamedata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save gamedata cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/gamedata
            data/gamedata-levels
          key: gamedata-${{ hashFiles('data/gamedata/archives/release_meta.json', 'data/gamedata-levels/archives/release_meta.json') }}

      - name: Download bundled storyjson zip
        run: |
          mkdir -p data/storyjson
          gh release download \
            --repo 3aKHP/ArknightsStoryJson \
            --pattern "zh_CN.zip" \
            --dir data/storyjson/ \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify bundled package data
        run: python python/scripts/check_package_data.py --data-root data

      - name: Resolve image name and version
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/prts-mcp" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#python/v}"
          echo "value=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: docker build -f python/Dockerfile -t prts-mcp:release .

      - name: Smoke test Docker image
        run: |
          python - <<'PY'
          import subprocess, json, sys

          proc = subprocess.Popen(
              ["docker","run","-i","--rm","prts-mcp:release"],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE,
          )

          def send(msg):
              proc.stdin.write((json.dumps(msg) + "\n").encode())
              proc.stdin.flush()

          def recv():
              line = proc.stdout.readline()
              if not line:
                  raise RuntimeError("stdout closed unexpectedly")
              return json.loads(line)

          send({"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}})
          r = recv()
          assert r.get("id") == 1, f"Expected initialize response, got: {r}"

          send({"jsonrpc":"2.0","method":"notifications/initialized","params":{}})
          send({"jsonrpc":"2.0","method":"tools/list","id":2,"params":{}})
          r = recv()
          assert r.get("id") == 2, f"Expected tools/list response, got: {r}"

          names = {t["name"] for t in r["result"]["tools"]}
          assert "get_operator_archives" in names, f"Missing tool. Got: {names}"
          assert "search_prts" in names, f"Missing tool. Got: {names}"
          print("Smoke test passed:", sorted(names))

          proc.stdin.close()
          proc.wait(timeout=10)
          PY

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          VERSION="${{ steps.version.outputs.value }}"
          docker tag prts-mcp:release "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${VERSION}"
          if [[ "${{ steps.version.outputs.prerelease }}" != "true" ]]; then
            docker tag prts-mcp:release "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi

  github-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          pip install build
          python -m build python/

      - name: Extract changelog section
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          python3 - <<'PY' > release_notes.txt
          import re, os
          version = os.environ["VERSION"]
          text = open("python/CHANGELOG.md").read()
          m = re.search(
              r"## \[" + re.escape(version) + r"\][^\n]*\n(.*?)(?=\n## \[|\Z)",
              text, re.DOTALL
          )
          print(m.group(1).strip() if m else "See CHANGELOG.md for details.")
          PY

      - name: Append install instructions
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          printf '\n---\n\n**Install**\n```bash\npip install prts-mcp==%s\n```\n\n**Docker**\n```bash\ndocker pull %s:%s\n```\n' \
            "$VERSION" "$IMAGE" "$VERSION" >> release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: python/dist/*
          prerelease: ${{ needs.build-and-push.outputs.prerelease }}
          make_latest: ${{ needs.build-and-push.outputs.prerelease == 'true' && 'false' || 'true' }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          pip install build
          python -m build python/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
